<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPulse AI - Academic Risk Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- ======== APP SHELL ======== -->
    <div id="app-shell" class="hidden">
      <header class="topbar">
        <div class="topbar-left">
          <span class="material-symbols-outlined logo-icon">school</span>
          <h2>EduPulse AI</h2>
        </div>
        <nav class="top-nav">
          <a href="#/dashboard" class="nav-item active" data-route="/dashboard">Dashboard</a>
          <a href="#/students" class="nav-item" data-route="/students">Students</a>
          <a href="#/predict" class="nav-item" data-route="/predict">Predict Risk</a>
          <a href="#/dataset" class="nav-item" data-route="/dataset">Dataset</a>
          <a href="#/model" class="nav-item" data-route="/model">Model Analytics</a>
        </nav>
        <div class="user-profile">
          <div class="user-info">
            <span class="user-name" id="user-name-display">Prof. Admin</span>
          </div>
          <div class="avatar">A</div>
          <button id="logout-btn" class="icon-button" title="Logout">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
      </header>
      <main class="main-content">
        <div id="page-container" class="page-container"></div>
      </main>
    </div>

    <!-- ======== AUTH SHELL ======== -->
    <div id="auth-shell" class="auth-shell">
      <div class="auth-logo-top">
        <span class="material-symbols-outlined logo-icon-top">school</span>
        <span class="logo-text">EduPulse AI</span>
      </div>
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to access academic intelligence</p>
        </div>
        <form id="login-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="admin@edupulse.edu" required />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Authenticate</button>
          <div id="auth-error" class="error-text hidden">Invalid credentials.</div>
        </form>
      </div>
    </div>

    <!-- ======== MODAL OVERLAY (shared) ======== -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-box" class="modal-box">
        <div class="modal-header">
          <h3 id="modal-title">Modal</h3>
          <button id="modal-close" class="icon-button"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <!-- ============================================== -->
    <!--                   TEMPLATES                    -->
    <!-- ============================================== -->

    <!-- ── Dashboard ─────────────────────────────── -->
    <template id="tpl-dashboard">
      <div class="page dashboard-page">
        <div class="page-header">
          <div>
            <h2>Academic Dashboard</h2>
            <p>Overview of student performance and risk metrics.</p>
          </div>
          <div style="display:flex;gap:12px;">
            <select class="select-field"><option>All Departments</option><option>Engineering</option></select>
            <select class="select-field"><option>Fall 2026</option></select>
          </div>
        </div>
        <div class="kpi-grid">
          <div class="surface-container kpi-card">
            <div class="kpi-title">Total Enrollment</div>
            <div class="kpi-value">12,000</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Identified At Risk</div>
            <div class="kpi-value text-error">1,920</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Campus Attendance</div>
            <div class="kpi-value">82.4%</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Predictive Accuracy</div>
            <div class="kpi-value text-success">97.6%</div>
          </div>
        </div>
        <div class="chart-grid">
          <div class="surface-container chart-card">
            <h3>Risk Distribution</h3>
            <div class="chart-wrapper"><canvas id="chart-risk"></canvas></div>
          </div>
          <div class="surface-container chart-card">
            <h3>High Risk By Department</h3>
            <div class="chart-wrapper"><canvas id="chart-dept"></canvas></div>
          </div>
          <div class="surface-container chart-card full-width">
            <h3>Attendance vs Final Score Correlation</h3>
            <div class="chart-wrapper"><canvas id="chart-scatter"></canvas></div>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Student Directory ─────────────────────── -->
    <template id="tpl-students">
      <div class="page students-page">
        <div class="page-header">
          <div>
            <h2>Student Directory</h2>
            <p>Manage and view all enrolled student profiles.</p>
          </div>
          <button class="btn btn-primary" id="btn-enroll-student">
            <span class="material-symbols-outlined" style="vertical-align:middle;margin-right:6px;font-size:18px;">person_add</span>
            Enroll New Student
          </button>
        </div>
        <div class="table-responsive">
          <table class="smart-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Department</th>
                <th>Semester</th>
                <th>GPA</th>
                <th>Attendance</th>
                <th>Risk Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="student-table-body">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:#978F66;">Loading students…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- ── Dataset Explorer ──────────────────────── -->
    <template id="tpl-dataset">
      <div class="page dataset-page">
        <div class="page-header">
          <div>
            <h2>Dataset Explorer</h2>
            <p>Inspect the training dataset used for the prediction model.</p>
          </div>
          <button class="btn btn-secondary" id="btn-export-csv">Export to CSV</button>
        </div>
        <div class="kpi-grid">
          <div class="surface-container kpi-card">
            <div class="kpi-title">Total Records</div>
            <div class="kpi-value" id="kpi-total">—</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Original Source</div>
            <div class="kpi-value">1,000</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Synthetic Augmented</div>
            <div class="kpi-value">11,000</div>
          </div>
          <div class="surface-container kpi-card">
            <div class="kpi-title">Features</div>
            <div class="kpi-value">14</div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="smart-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Dept</th>
                <th>Sem</th>
                <th>Study Hrs</th>
                <th>Attend %</th>
                <th>Assignments</th>
                <th>Midterm</th>
                <th>GPA</th>
                <th>Absences</th>
                <th>Origin</th>
              </tr>
            </thead>
            <tbody id="dataset-table-body"></tbody>
          </table>
          <div id="dataset-load-more-wrapper" style="text-align:center; padding:24px; background-color:var(--smart-surface); border-top:1px solid var(--smart-border);">
            <button id="btn-load-more" class="btn btn-secondary" style="min-width:240px;">
              Load More Records (<span id="loaded-count">0</span> / <span id="total-count">…</span>)
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Model Analytics ───────────────────────── -->
    <template id="tpl-model">
      <div class="page model-page">
        <div class="page-header">
          <div>
            <h2>Model Analytics</h2>
            <p>Performance metrics of the active Random Forest classifier.</p>
          </div>
        </div>
        <div class="predict-layout">
          <div class="surface-container result-card">
            <h3>Algorithm Comparison (Cross-Validation)</h3>
            <div class="table-responsive mt-4">
              <table class="smart-table">
                <thead>
                  <tr><th>Algorithm</th><th>Mean F1</th><th>Mean Recall</th><th>Status</th></tr>
                </thead>
                <tbody>
                  <tr>
                    <td><strong>Random Forest</strong></td><td>0.8902</td><td>0.8517</td>
                    <td><span class="badge success">Active (Production)</span></td>
                  </tr>
                  <tr>
                    <td>Decision Tree</td><td>0.6864</td><td>0.7709</td>
                    <td><span class="badge warning">Evaluated</span></td>
                  </tr>
                  <tr>
                    <td>Logistic Regression</td><td>0.5267</td><td>0.7735</td>
                    <td><span class="badge warning">Evaluated</span></td>
                  </tr>
                  <tr>
                    <td>Support Vector Machine</td><td>0.5148</td><td>0.3907</td>
                    <td><span class="badge warning">Evaluated</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="surface-container">
            <h3>Test Set Evaluation</h3>
            <ul class="factors-list mt-4">
              <li><strong>Accuracy:</strong> 0.9760</li>
              <li><strong>Precision:</strong> 0.9714</li>
              <li><strong>Recall:</strong> 0.8517</li>
              <li><strong>F1-Score:</strong> 0.9189</li>
              <li><strong>ROC-AUC:</strong> 0.9982</li>
              <li><strong>PR-AUC:</strong> 0.9912</li>
            </ul>
            <h4 style="margin-top:24px;margin-bottom:12px;">Model Information</h4>
            <ul class="factors-list">
              <li><strong>Version:</strong> 1.0.0</li>
              <li><strong>Training Set:</strong> 11,750 records</li>
              <li><strong>Test Set:</strong> 250 records (Original only)</li>
              <li><strong>Pipeline:</strong> StandardScaler + OneHotEncoder</li>
            </ul>
          </div>
        </div>
      </div>
    </template>

    <!-- ── Prediction Form ───────────────────────── -->
    <template id="tpl-predict">
      <div class="page predict-page">
        <div class="page-header">
          <div>
            <h2>Student Risk Prediction</h2>
            <p>Enter student academic profile to predict academic risk utilizing the Random Forest model.</p>
          </div>
        </div>
        <div class="predict-layout">
          <div class="surface-container">
            <form id="prediction-form" class="material-form">
              <div class="form-grid">
                <div class="input-group"><label>Age</label><input type="number" id="p-age" min="15" max="40" value="20" required></div>
                <div class="input-group"><label>Gender</label><select id="p-gender" required><option>Male</option><option>Female</option></select></div>
                <div class="input-group"><label>Department</label><select id="p-department" required><option>Engineering</option><option>Computer Science</option><option>Business</option><option>Social Sciences</option></select></div>
                <div class="input-group"><label>Semester</label><input type="number" id="p-semester" min="1" max="10" value="3" required></div>
                <div class="input-group"><label>Study Hours/Week</label><input type="number" id="p-study" step="0.1" value="15" required></div>
                <div class="input-group"><label>Attendance %</label><input type="number" id="p-attendance" step="0.1" max="100" value="75" required></div>
                <div class="input-group"><label>Assignment Avg</label><input type="number" id="p-assignment" step="0.1" max="100" value="70" required></div>
                <div class="input-group"><label>Midterm Score</label><input type="number" id="p-midterm" step="0.1" max="100" value="65" required></div>
                <div class="input-group"><label>Previous GPA</label><input type="number" id="p-gpa" step="0.01" max="4.0" value="2.8" required></div>
                <div class="input-group"><label>Absences</label><input type="number" id="p-absences" min="0" value="4" required></div>
                <div class="input-group"><label>Internet Access</label><select id="p-internet" required><option>Yes</option><option>No</option></select></div>
                <div class="input-group"><label>Extracurricular Hrs/Wk</label><input type="number" id="p-extra" step="0.1" value="4" required></div>
                <div class="input-group"><label>Extra Academic Support</label><select id="p-support" required><option>No</option><option>Yes</option></select></div>
                <div class="input-group"><label>Part-Time Job</label><select id="p-job" required><option>No</option><option>Yes</option></select></div>
              </div>
              <div class="mt-4">
                <button type="submit" class="btn btn-primary btn-block" id="btn-submit-predict">Execute AI Prediction</button>
              </div>
            </form>
          </div>
          <div class="surface-container result-card hidden" id="prediction-result">
            <h3>Intelligence Report</h3>
            <div class="result-header">
              <div class="badge" id="res-badge">Evaluating…</div>
              <div class="risk-prob" id="res-prob">—%</div>
            </div>
            <h4 style="margin-bottom:12px;">Contributing Factors</h4>
            <ul class="factors-list" id="res-factors"></ul>
            <h4 style="margin-bottom:12px;margin-top:24px;">Recommended Intervention</h4>
            <p id="res-intervention" class="intervention-text">—</p>
            <div class="result-meta mt-4">
              <span>Model Engine: Random Forest v<span id="res-version">—</span></span>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="/main.js"></script>
  </body>
</html>
